<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLM Collabspace - Domain Space Content</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;
  min-height:100%;
  font-family:"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#F9F8F5;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
  min-height:100vh;
}
.master{
  width:1550px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  background:#F9F8F5;
  border:1px solid #E6E3DD;
  border-radius:16px;
  padding:48px 40px 40px;
}
.header-block{
  padding-left:220px;
  margin-bottom:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.s-label{
  font-size:12px;
  font-weight:500;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:#8C8B84;
}
.ui-title{
  font-family:"Instrument Serif",Georgia,serif;
  font-size:22px;
  font-weight:400;
  font-style:italic;
  color:#18171A;
  line-height:1.2;
}
.content-row{
  display:flex;
  flex-direction:row;
  align-items:flex-start;
  gap:0;
  width:100%;
  position:relative;
}
.anns{
  width:220px;
  height:660px;
  flex-shrink:0;
  position:relative;
}
.ann-svg{
  position:absolute;
  top:0;
  left:0;
  width:220px;
  height:660px;
  pointer-events:none;
  z-index:25;
  overflow:visible;
}
.ann{
  position:absolute;
  width:165px;
  left:0;
  top:270px;
  display:flex;
  flex-direction:column;
  gap:5px;
  z-index:26;
}
.ann-t{
  font-size:12.5px;
  font-weight:600;
  color:#18171A;
  line-height:1.3;
  letter-spacing:-0.01em;
}
.ann-d{
  font-size:11.5px;
  font-weight:400;
  color:rgba(24,23,26,0.5);
  line-height:1.5;
}
.shell{
  width:1150px;
  height:660px;
  flex-shrink:0;
  background:#fff;
  border:1px solid #d5dee2;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(10,20,35,.10),0 2px 8px rgba(10,20,35,.06);
  position:relative;
  z-index:5;
}
.hub-frame{
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:#f8fafc;
}
.right-bal{
  width:180px;
  flex-shrink:0;
}
</style>
</head>
<body>
<div class="master">
  <div class="header-block">
    <span class="s-label">Design Decisions</span>
    <h2 class="ui-title">Domain reels — expertise made visible</h2>
  </div>

  <div class="content-row">
    <div class="anns">
      <svg class="ann-svg" viewBox="0 0 220 660" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="spineGrad" x1="0" y1="0" x2="0" y2="660" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#D4C9BE" stop-opacity="0"/>
            <stop offset="8%" stop-color="#D4C9BE" stop-opacity="0.8"/>
            <stop offset="92%" stop-color="#D4C9BE" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#D4C9BE" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <line x1="210" y1="0" x2="210" y2="660" stroke="url(#spineGrad)" stroke-width="1"/>
        <line x1="160" y1="330" x2="210" y2="330" stroke="#C07B50" stroke-width="1" stroke-opacity="0.5"/>
        <circle cx="210" cy="330" r="4" fill="#C07B50"/>
        <circle cx="210" cy="330" r="7" fill="#C07B50" fill-opacity="0.15"/>
      </svg>
      <div class="ann">
        <div class="ann-t">The core content model</div>
        <div class="ann-d">Short-form reels replaced static pages — each one makes domain expertise discoverable without requiring the viewer to already know who to ask.</div>
      </div>
    </div>

    <div class="shell">
      <iframe
        class="hub-frame"
        name="collabspaceDomainContent"
        src="/screens/collabspace-global-hub-page.html"
        title="PLM Collabspace domain content screen"
      ></iframe>
    </div>

    <div class="right-bal"></div>
  </div>
</div>
</body>
</html>
