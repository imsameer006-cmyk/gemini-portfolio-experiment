<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLM Collabspace - Global Hub in Context</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;
  min-height:100%;
  font-family:"Inter",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  background:#F9F8F5;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}
.master{
  width:1550px;
  height:860px;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#F9F8F5;
  border:1px solid #E6E3DD;
  padding:48px 40px 34px;
}
.header-block{
  width:1150px;
  margin-bottom:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.s-label{
  font-size:12px;
  font-weight:500;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:#8C8B84;
}
.ui-title{
  font-family:"Instrument Serif",Georgia,serif;
  font-size:22px;
  font-weight:400;
  font-style:italic;
  color:#18171A;
  line-height:1.2;
}
.content-row{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  width:100%;
  position:relative;
}
.shell{
  width:1150px;
  height:660px;
  flex-shrink:0;
  background:#fff;
  border:1px solid #d5dee2;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 12px 40px rgba(10,20,35,.10),0 2px 8px rgba(10,20,35,.06);
  position:relative;
  z-index:5;
}
.hub-frame{
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:#f8fafc;
}
</style>
</head>
<body>
<div class="master">
  <div class="header-block">
    <span class="s-label">Solution</span>
    <h2 class="ui-title">The Global Hub — scrolling through the platform</h2>
  </div>

  <div class="content-row">
    <div class="shell">
      <iframe
        class="hub-frame"
        name="collabspaceGlobalHub"
        src="/screens/collabspace-global-hub-page.html"
        title="PLM Collabspace global hub screen"
      ></iframe>
    </div>
  </div>

</div>
</body>
</html>
