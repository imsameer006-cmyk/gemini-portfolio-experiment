function InteractiveNetwork({ activated, frozenHalos, hovered, complete, completionArrived, onHover, onActivate }) {
  const hoverRadii = useRef({});
  const anyActive = activated.size > 0;

  return (
    <div className="absolute inset-0 z-[1]">
      <div
        className="absolute inset-0 z-[2] pointer-events-none"
        style={{ background: "linear-gradient(to right, #F9F8F5 0%, #F9F8F5 25%, transparent 50%)" }}

      <svg
        viewBox="0 0 1280 700"
        preserveAspectRatio="xMidYMid slice"
        className="pointer-events-none absolute inset-0 h-full w-full lg:pointer-events-auto"
        aria-label="Interactive abstract workflow network"
        role="group"
        style={{ opacity: complete ? 0.48 : 0.24, transition: "opacity 1200ms ease" }}
      >
        <defs>
          <linearGradient id="micro-network-fade" x1="284" y1="0" x2="1245" y2="0" gradientUnits="userSpaceOnUse">
            <stop stopColor="#C8BFB2" stopOpacity="0.12" />

            <stop offset="0.5" stopColor="#C8BFB2" stopOpacity="0.16" />
            <stop offset="1" stopColor="#C8BFB2" stopOpacity="0.25" />
          </linearGradient>
          <linearGradient id="active-network-route" x1="498" y1="0" x2="1173" y2="0" gradientUnits="userSpaceOnUse">
            <stop stopColor="#C07B50" stopOpacity="0.85" />
            <stop offset="0.72" stopColor="#C07B50" stopOpacity="0.75" />
            <stop offset="1" stopColor="#BFA391" stopOpacity="0.45" />
          </linearGradient>
          <linearGradient id="network-shimmer" x1="0" y1="0" x2="1" y2="0">
            <stop stopColor="#FFFFFF" stopOpacity="0" />
            <stop offset="0.44" stopColor="#F9F8F5" stopOpacity="0.72" />
            <stop offset="0.58" stopColor="#F0EDE8" stopOpacity="0.88" />
            <stop offset="1" stopColor="#FFFFFF" stopOpacity="0" />
          </linearGradient>
          <filter id="network-node-glow" x="-180%" y="-180%" width="460%" height="460%">
            <feGaussianBlur stdDeviation="10" />
          </filter>
          <filter id="network-shimmer-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.5" />
          </filter>
        </defs>

        <g transform="translate(80, 0)">

        <motion.g
          fill="none" stroke="#C8BFB2" strokeWidth="0.5"
          initial={false}
          animate={{ opacity: complete ? 0.2 : 0.12 }}
          transition={{ duration: 1.2, ease: EASE }}
        >
          {MICRO_PATHS.map((path, index) => (
            <path key={path} d={path} strokeDasharray={index % 3 === 0 ? "2 12" : index % 3 === 1 ? "12 14" : undefined} />
          ))}
        </motion.g>

        <motion.g
          fill="#9E7E6B"
          initial={false}
          animate={{ opacity: complete ? 0.22 : 0.14 }}
          transition={{ duration: 1.2, ease: EASE }}
        >
          {MICRO_NODES.map((node, index) => (
            <circle key={`${node.x}-${node.y}`} cx={node.x} cy={node.y} r={index % 4 === 0 ? 1.5 : 1} />

        </motion.g>

        <g fill="none" stroke="url(#base-network-fade)" strokeWidth="0.65">
          {NETWORK_PATHS.map((path) => <path key={path.id} d={path.d} />)}
          {SECONDARY_PATHS.map((path) => <path key={path} d={path} strokeDasharray="6 10" />)}
        </g>

        {NETWORK_PATHS.map((path) => {
          const active = activated.has(path.owner);
          const preview = hovered === path.owner;
          return (
            <motion.path
              key={`active-${path.id}`}
              d={path.d}
              fill="none"
              stroke="url(#active-network-route)"
              strokeWidth={active ? 1.6 : 1.2}
              strokeLinecap="round"
              initial={false}
              animate={{ opacity: active ? 0.82 : preview ? 0.25 : 0, pathLength: active || preview ? 1 : 0 }}
              transition={{ duration: active ? 0.65 : 0.35, delay: active ? 0.72 + path.delay : 0, ease: EASE }}
            />
          );
        })}

        {NETWORK_PATHS.map((path) => {
          const active = activated.has(path.owner);
          return (
            <motion.path
              key={`shimmer-${path.id}`}
              d={path.d}
              fill="none"
              stroke="url(#network-shimmer)"
              strokeWidth="2.8"
              strokeLinecap="round"
              strokeDasharray="54 920"
              filter="url(#network-shimmer-glow)"
              initial={false}
              animate={{ opacity: active ? [0, 0.82, 0] : 0, strokeDashoffset: active ? [80, -920] : 80 }}
              transition={{ duration: 0.92, delay: active ? path.delay : 0, ease: "easeInOut", times: [0, 0.48, 1] }}
            />

          ))}
        </g>

        {INTERACTIVE_NODES.map((node) => {
          const frozenHalo = frozenHalos[node.id];
          if (!frozenHalo) return null;
          return (
            <motion.circle
              key={`frozen-halo-${node.id}`}
              cx={node.x} cy={node.y}
              fill={node.id === 2 ? "#C07B50" : "#BFA391"}

              pointerEvents="none"
              initial={{ opacity: 0.055, r: frozenHalo.captured }}
              animate={{ opacity: 0.03, r: frozenHalo.target }}
              transition={{ duration: 1.35, ease: EASE }}
            />
          );
        })}

        {INTERACTIVE_NODES.map((node, nodeIndex) => {
          const active = activated.has(node.id);
          const preview = hovered === node.id;
          const highlighted = active || preview;
          const finalComplete = completionArrived;

          return (
            <g
              key={node.id}
              role="button"
              tabIndex={0}
              aria-label={`${active ? "Activated" : "Activate"} network node ${node.id + 1}`}
              onMouseEnter={() => onHover(node.id)}
              onMouseLeave={() => onHover(null)}
              onFocus={() => onHover(node.id)}
              onBlur={() => onHover(null)}

              onKeyDown={(event) => {

                  onActivate(node.id);

              className="pointer-events-none outline-none lg:pointer-events-auto lg:cursor-pointer"

                fill={node.id === 2 ? "#C07B50" : "#BFA391"}

                pointerEvents="none"
                initial={{ opacity: 0 }}
                animate={{ opacity: anyActive ? 0 : [0.05, 0.18, 0.05] }}

                <motion.ellipse
                  cx={node.x} cy={node.y} rx={2} ry={14}
                  fill="white"
                  filter="url(#network-shimmer-glow)"
                  pointerEvents="none"
                  initial={{ opacity: 0, x: -28 }}
                  animate={{ opacity: anyActive ? 0 : [0, 0.65, 0], x: anyActive ? 0 : [-28, 0, 28] }}
                  transition={anyActive ? { duration: 0.4, ease: "easeOut" } : { duration: 4, repeat: Infinity, ease: "easeInOut", delay: nodeIndex * 0.5 }}
                />
              </g>
              <motion.circle
                cx={node.x} cy={node.y} r="22"
                fill={finalComplete ? "#BFA391" : node.id === 2 ? "#C07B50" : "#BFA391"}
                filter="url(#network-node-glow)"
                initial={false}
                animate={{ opacity: active ? 0.08 : 0 }}
                transition={{ duration: 0.35 }}
              />
              {node.shape === "square" ? (
                <motion.rect
                  x={node.x - 7} y={node.y - 7} width="14" height="14"
                  fill={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#F9F8F5"}
                  stroke={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#9E7E6B"}
                  strokeWidth="2"
                  initial={false}
                  animate={{ opacity: highlighted ? 1 : 0.72, scale: highlighted ? 1.12 : 1 }}
                  transition={{ delay: active ? 0.72 : 0, duration: 0.35, ease: EASE }}
                  style={{ transformOrigin: `${node.x}px ${node.y}px` }}
                />
              ) : node.shape === "diamond" ? (
                <motion.rect
                  x={node.x - 6.5} y={node.y - 6.5} width="13" height="13" rx="1"
                  fill={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#F9F8F5"}
                  stroke={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#9E7E6B"}
                  strokeWidth="2"
                  initial={false}
                  animate={{ opacity: highlighted ? 1 : 0.72, scale: highlighted ? 1.14 : 1, rotate: 45 }}
                  transition={{ delay: active ? 0.72 : 0, duration: 0.35, ease: EASE }}
                  style={{ transformOrigin: `${node.x}px ${node.y}px` }}
                />
              ) : node.shape === "completion" ? (
                <motion.g
                  initial={false}
                  animate={{ opacity: highlighted ? 1 : 0.72, scale: highlighted ? 1.12 : 1 }}
                  transition={{ delay: active ? 0.72 : 0, duration: 0.35, ease: EASE }}
                  style={{ transformOrigin: `${node.x}px ${node.y}px` }}
                >
                  <circle cx={node.x} cy={node.y} r="8" fill={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#F9F8F5"} stroke={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#9E7E6B"} strokeWidth="2" />
                  <circle cx={node.x} cy={node.y} r="3" fill={finalComplete ? "#F9F8F5" : active ? "#F9F8F5" : "#9E7E6B"} opacity={finalComplete || active ? 0.92 : 0.52} />
                </motion.g>
              ) : (
                <motion.circle
                  cx={node.x} cy={node.y} r="4"
                  fill={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#F9F8F5"}
                  stroke={finalComplete ? "#BFA391" : active ? "#9E7E6B" : "#9E7E6B"}
                  strokeWidth="2"
                  initial={false}
                  animate={{ opacity: highlighted ? 1 : 0.72, scale: highlighted ? 1.18 : 1 }}
                  transition={{ delay: active ? 0.72 : 0, duration: 0.35, ease: EASE }}
                  style={{ transformOrigin: `${node.x}px ${node.y}px` }}
                />
              )}
            </g>
          );
        })}

        </g>
      </svg>
    </div>
  );
}

const DEFAULT_METADATA = [
  { label: "Year", value: "2025–2026" },
  { label: "Role", value: "UX Designer" },
  { label: "Product", value: "Gemini – Digital Twin" },
  { label: "Domain", value: "B2B" },
  { label: "Users", value: "FAE, PAE, PMG, PJM" },
  { label: "Scope", value: "MVP" },
];

function GeminiProjectHero({
  category = "Workflow Design",
  title = "Multi-Stakeholder Approval Workflow for a Digital Twin Platform",
  description = "Designed a visible approval workflow that clarified ownership, review state, and next actions across four engineering roles.",
  client,
  impact = "Launched to 50+ FAEs in China",
  tags = ["Workflow Design", "B2B", "UX Research", "Systems Design"],
  metadata = DEFAULT_METADATA,
}) {
  const reduceMotion = useReducedMotion();
  const [activated, setActivated] = useState(() => new Set());
  const [frozenHalos, setFrozenHalos] = useState({});
  const [hovered, setHovered] = useState(null);
  const [hasInteracted, setHasInteracted] = useState(false);
  const complete = activated.size === INTERACTIVE_NODES.length;
  const [showCompletionSweep, setShowCompletionSweep] = useState(false);
  const [completionArrived, setCompletionArrived] = useState(false);

  const activateNode = (id, visibleRadius) => {
    if (activated.has(id)) return;
    setHasInteracted(true);
    const capturedRadius = Math.min(420, Math.max(110, visibleRadius ?? 110));
    const targetRadius = capturedRadius < 190 ? 130 : capturedRadius < 310 ? 240 : 360;
    const next = new Set(activated);
    next.add(id);
    setActivated(next);
    setFrozenHalos((current) => ({ ...current, [id]: { captured: capturedRadius, target: targetRadius } }));
    if (next.size === INTERACTIVE_NODES.length) {
      setShowCompletionSweep(true);
      window.setTimeout(() => setCompletionArrived(true), 2450);
    }
  };

  const handleHover = (id) => {
    if (id !== null) setHasInteracted(true);
    setHovered(id);
  };

  return (
    <div className="relative isolate overflow-hidden bg-[#F9F8F5]">
      <div aria-hidden="true" className="pointer-events-none absolute inset-y-0 right-0 z-[2] w-[7%]"
        style={{ background: "linear-gradient(90deg, rgba(249,248,245,0), rgba(249,248,245,0.72))" }} />
      <div aria-hidden="true" className="pointer-events-none absolute inset-x-0 bottom-0 z-[2] h-24"
        style={{ background: "linear-gradient(180deg, rgba(249,248,245,0), rgba(249,248,245,0.52))" }} />

      <AnimatePresence>
        {showCompletionSweep ? (
          <motion.div
            aria-hidden="true"
            className="pointer-events-none absolute -inset-y-[18%] -left-[68%] z-[3] w-[72%] skew-x-[-26deg] blur-[28px]"
            style={{ background: "linear-gradient(90deg, transparent 0%, rgba(192,123,80,0.06) 15%, rgba(255,255,255,1.0) 48%, rgba(192,123,80,0.12) 70%, transparent 100%)" }}
            initial={{ x: "0%", opacity: 0.08 }}
            animate={{ x: "225%", opacity: [0, 0.85, 0] }}
            exit={{ opacity: 0 }}
            transition={{ duration: reduceMotion ? 0 : 2.4, ease: [0.4, 0, 0.2, 1], times: [0, 0.48, 1] }}
          />
        ) : null}
      </AnimatePresence>

      <section
        aria-labelledby="hero-lab-title"
        className="relative flex md:min-h-screen flex-col justify-start overflow-x-hidden px-6 pb-16 md:pb-[88px] pt-[72px] md:px-10"
      >
        <InteractiveNetwork
          activated={activated}
          frozenHalos={frozenHalos}
          hovered={hovered}
          complete={complete}
          completionArrived={completionArrived}
          onHover={handleHover}
          onActivate={activateNode}
        />

        <div className="pointer-events-none relative z-[10] mx-auto w-full max-w-[1280px]">
          <motion.div
            initial={{ opacity: 0, y: 18 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: reduceMotion ? 0 : 0.55, ease: EASE }}
            className="mb-8"
          >
            <div className="mb-[28px] w-fit">
              <p className="text-[12px] font-[525] uppercase tracking-widest text-[#1C1A16]/40">{category}</p>
            </div>
            <h1
              id="hero-lab-title"
              className="font-[family-name:var(--font-instrument-serif)] text-[clamp(2.50rem,3.74vw,4.06rem)] italic leading-tight text-[#1C1A16] max-w-[670px]"
            >
              {title}
            </h1>
          </motion.div>

          <motion.div
            initial={{ opacity: 0, y: 18 }}
            animate={{ opacity: 1, y: 0 }}
            transition={{ duration: reduceMotion ? 0 : 0.55, delay: 0.1, ease: EASE }}
            className="pointer-events-none"
          >
            <p className="mb-[32px] max-w-[560px] text-base leading-relaxed text-[#1C1A16]/60">{description}</p>

            <div
              className="grid w-fit grid-cols-[auto_auto] sm:grid-cols-[auto_auto_auto] overflow-hidden rounded-xl border border-[#E6E3DD] bg-[#E6E3DD] gap-px"
              style={{ boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}
            >
              {metadata.map(({ label, value }) => (
                <div key={label} className="flex flex-col gap-1.5 bg-white px-6 py-3">
                  <span className="text-[10px] font-medium uppercase tracking-widest text-[#1C1A16]/[0.38]">{label}</span>
                  <span className="text-[15px] font-normal text-[#1C1A16]/85 leading-snug">{value}</span>
                </div>
              ))}
            </div>

            <div className="mt-[20px] flex max-w-[1280px] items-end justify-between">
              <div className="flex max-w-[583px] flex-wrap gap-[10px]">
                {client && (
                  <span className="rounded-full bg-[#1C1A16]/[0.09] px-3 py-1.5 text-sm font-medium text-[#1C1A16]">{client}</span>
                )}
                <span className="rounded-full border border-[#C8BFB2] px-3 py-1.5 text-[12.5px] text-[#1C1A16]/55">{impact}</span>
                {tags.map((tag) => (
                  <span key={tag} className="rounded-full border border-[#C8BFB2] px-3 py-1.5 text-[12.5px] text-[#1C1A16]/55">{tag}</span>
                ))}
              </div>

              <AnimatePresence>
                {!hasInteracted ? (
                  <motion.div
                    aria-hidden="true"
                    className="pointer-events-none hidden items-center gap-2.5 pb-1 lg:flex"
                    initial={{ opacity: 0, y: 6 }}
                    animate={{ opacity: 0.62, y: 0 }}
                    exit={{ opacity: 0, y: 4 }}
                    transition={{ duration: 0.45, delay: 1.1, ease: EASE }}
                  >
                    <motion.span
                      className="block h-2.5 w-2.5 rounded-full border border-[#C07B50]/75 bg-[#F9F8F5] shadow-[0_0_0_1px_rgba(192,123,80,0.08)]"
                      animate={{
                        boxShadow: [
                          "0 0 0 1px rgba(192,123,80,0.18), 0 0 0 0 rgba(192,123,80,0.18)",
                          "0 0 0 1px rgba(192,123,80,0.22), 0 0 0 8px rgba(192,123,80,0.12)",
                          "0 0 0 1px rgba(192,123,80,0.16), 0 0 0 15px rgba(192,123,80,0)",
                        ],
                        scale: [1, 1.12, 1],
                      }}
                      transition={{ duration: 2.2, repeat: Infinity, ease: "easeOut" }}
                    />
                    <span className="text-[10px] font-semibold uppercase tracking-[0.16em] text-[#C07B50]/85">Explore the workflow</span>
                  </motion.div>
                ) : null}
              </AnimatePresence>
            </div>
          </motion.div>
        </div>
      </section>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GeminiProjectHero />);
